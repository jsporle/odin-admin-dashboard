<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="container">
        <!-- sidebar -->
        <div class="sidebar">
            <div class="header-logo">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </div>
            <ul class="sidebar-main-menu">
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">home</span>
                    <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">account_box</span>
                    <span>Profile</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">chat</span>
                    <span>Messages</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">history</span>
                    <span>History</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">task</span>
                    <span>Tasks</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">diversity_3</span>
                    <span>Communities</span>
                    </a>
                </li>
            </ul>
            <ul class="sidebar-secondary-menu">
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">settings</span>
                    <span>Settings</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">contact_support</span>
                    <span>Support</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                    <span class="material-symbols-outlined">verified_user</span>
                    <span>Privacy</span>
                    </a>
                </li>
            </ul>

        </div>
            <!-- header -->
            <div class="header">
                
                <div class="search-bar">
                    <form 
                        action="#"
                        method="get">
                        <button
                            type="submit" 
                            class="search-btn">
                            <span class="material-symbols-outlined">search</span>
                        </button>
                        <input
                            type="text"
                            id="search"
                            name="search" />
                    </form>
                </div>
                <div class="user-profile">
                    <button class="icon-btn">
                        <span class="material-symbols-outlined">notifications</span>
                    </button>

                    <div class="user-info">
                        <img src="images/eggDP.jpg" alt="Profile Picture" class="avatar-small">
                        <span class="username">Default User</span>
                    </div>
                </div>
                <div class="welcome-card">
                    <img src="images/eggDP.jpg" alt="Profile Picture" class="avatar-large">
                    <span class="salutation">Hi there,</span>
                    <span class="jumbo-user">Default User (@default)</span>
                </div>
                <div class="header-buttons">
                    <input type="button"
                        id="btn-new"
                        name="btn-new"
                        value="New" />
                    <input type="button"
                        id="btn-upload"
                        name="btn-upload"
                        value="Upload" />
                    <input type="button"
                        id="btn-share"
                        name="btn-share"
                        value="Share" />
                </div>
            </div>
            <!-- main area -->
            <div class="main">
            </div>
    </div>
</body>
</html>
